version: '3.8'

networks:
  dcim-net:
    driver: bridge

volumes:
  nodered_data:
  influxdb_data:
  influxdb_config:
  grafana_data:

services:

  node-red:
    image: nodered/node-red:3.1.9
    container_name: dcim-nodered
    restart: unless-stopped
    environment:
      - TZ=Asia/Jakarta
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_SECRET}
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-mtechlabs}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-dcim}
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    networks:
      - dcim-net

  influxdb:
    image: influxdb:2.7
    container_name: dcim-influxdb
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-mtechlabs}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-dcim}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - TZ=Asia/Jakarta
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - dcim-net

  grafana:
    image: grafana/grafana-oss:10.4.0
    container_name: dcim-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - TZ=Asia/Jakarta
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - dcim-net
    depends_on:
      - influxdb

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dcim-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - dcim-net
    depends_on:
      - node-red
